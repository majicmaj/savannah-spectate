<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savannah — Spectate</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #1b2733; }
      #app { width: 100vw; height: 100vh; display: block; }
      #hud {
        position: fixed; left: 12px; top: 12px; z-index: 10;
        font: 13px/1.4 ui-monospace, Menlo, monospace; color: #e8eef2;
        text-shadow: 0 1px 2px #000a; pointer-events: none; white-space: pre;
      }
      #help {
        position: fixed; right: 12px; bottom: 12px; z-index: 10;
        font: 12px/1.5 ui-monospace, Menlo, monospace; color: #cdd6dd;
        text-shadow: 0 1px 2px #000a; pointer-events: none; text-align: right;
      }
      /* Loading veil: shown immediately, fades out once the world is ready so the
         first frames (terrain build, model pop-in) never flash to the viewer. */
      #loading {
        position: fixed; inset: 0; z-index: 50; display: flex;
        align-items: center; justify-content: center; flex-direction: column; gap: 18px;
        background: radial-gradient(circle at 50% 38%, #2a2114, #14110b 70%);
        color: #f8b95c; font: 600 16px/1.4 ui-monospace, Menlo, monospace; letter-spacing: 1px;
        transition: opacity 0.6s ease; opacity: 1;
      }
      #loading.hide { opacity: 0; pointer-events: none; }
      #loading .dot {
        width: 12px; height: 12px; border-radius: 50%; background: #f8b95c;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { transform: scale(0.6); opacity: .4; } 50% { transform: scale(1); opacity: 1; } }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud"></div>
    <div id="help">R random · [ / ] prev/next · scroll zoom · cam follows heading</div>
    <div id="loading"><div class="dot"></div><div>Entering the savanna…</div></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
